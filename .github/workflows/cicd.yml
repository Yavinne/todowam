name: CI/CD TodoWam app

on:
    push:
        branches: [main]

env:
  PROJECT_ID: boma-241
  VM_INSTANCE_LOCATION: us-central1-f
  VM_INSTANCE_NAME: boma-i1
  IMAGE_NAME: todowam

jobs:
    # 1. Build & test
    build-test:
      runs-on: ubuntu-latest
      environment: test

      steps:
        - name: Checkout
          uses: actions/checkout@v3

        - name: Build Docker image
          run: docker build -t $IMAGE_NAME:${{ github.sha }} .

        - name: Run tests
          run: docker run --rm -e CI=true $IMAGE_NAME:${{ github.sha }} npm test
    
    # 2. Push image
    push-image:
      runs-on: ubuntu-latest
      needs: build-test

      steps:
        - name: Checkout
          uses: actions/checkout@v3

        - name: Build Docker image
          run: docker build -t $IMAGE_NAME:${{ github.sha }} .

        - name: Authentication to Google Cloud
          uses: google-github-actions/auth@v1
          with:
            credentials_json: ${{ secrets.GCP_CREDENTIALS }}

        - name: Setup gcloud
          uses: google-github-actions/setup-gcloud@v1
          with:
            project_id: ${{ env.PROJECT_ID }}

        - name: Configure Docker auth
          run: gcloud auth configure-docker

        - name: Tag image
          run: |
            docker tag $IMAGE_NAME:${{ github.sha }} \
            gcr.io/${{ env.PROJECT_ID }}/$IMAGE_NAME:${{ github.sha }}

        - name: Push image
          run: |
            docker push gcr.io/${{ env.PROJECT_ID }}/$IMAGE_NAME:${{ github.sha }}

    # 3. deploy
    deploy:
      runs-on: ubuntu-latest
      needs: push-image

      steps:
        - name: Authentication to Google Cloud
          uses: google-github-actions/auth@v1
          with:
            credentials_json: ${{ secrets.GCP_CREDENTIALS }}

        - name: Setup gcloud
          uses: google-github-actions/setup-gcloud@v1
          with:
            project_id: ${{ env.PROJECT_ID }}

        - name: Deploy to VM instance
          run: |
            gcloud compute ssh "${{ env.VM_INSTANCE_NAME }}" \
            --zone "${{ env.VM_INSTANCE_LOCATION }}" \
            --project "${{ env.PROJECT_ID }}" \
            --command "
              gcloud auth activate-service-account --key-file /root/.ssh/google_compute_engine
              gcloud auth configure-docker
              docker pull gcr.io/${{ env.PROJECT_ID }}/$IMAGE_NAME:${{ github.sha }} &&
              docker stop $IMAGE_NAME || true &&
              docker rm $IMAGE_NAME || true &&
              docker run -d -p 80:3000 --name $IMAGE_NAME \
              gcr.io/${{ env.PROJECT_ID }}/$IMAGE_NAME:${{ github.sha }}
            "